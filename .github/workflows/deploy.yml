name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get base path
        id: pages
        uses: actions/configure-pages@v4

      - name: Resolve effective base path
        id: basepath
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          BASE_PATH="${PAGES_BASE_PATH}"
          if [ -z "${BASE_PATH}" ] || [ "${BASE_PATH}" = "/" ]; then
            BASE_PATH="/${REPO_NAME}"
          fi
          echo "base_path=${BASE_PATH}" >> "$GITHUB_OUTPUT"
          echo "Using base path: ${BASE_PATH}"

      - name: Build
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}
          BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          NEXT_PUBLIC_DB_RELEASE_URL: "https://github.com/${{ github.repository }}/releases/download/db-snapshots"
          NEXT_PUBLIC_SENTRY_DISABLED: "true"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
