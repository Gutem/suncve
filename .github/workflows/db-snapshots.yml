name: DB Snapshots (Incremental)

on:
  workflow_dispatch:
    inputs:
      repo_batch_size:
        description: "Batch size for repository verification"
        required: false
        default: "200"
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: db-snapshots
  cancel-in-progress: false

jobs:
  update-db:
    runs-on: ubuntu-latest
    env:
      SNAPSHOT_TAG: db-snapshots
      REPO_BATCH_SIZE: ${{ github.event.inputs.repo_batch_size || '200' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3 beautifulsoup4 cvss

      - name: Ensure Snapshot Release Exists
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.SNAPSHOT_TAG;
            let release;
            try {
              release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            } catch (e) {
              if (e.status !== 404) throw e;
              release = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: "DB Snapshots",
                body: "Rolling snapshots for incremental CVE DB state",
                draft: false,
                prerelease: false
              });
            }

            const assets = (release.data.assets || [])
              .filter(a => /^snapshot-.*\.tar\.gz$/.test(a.name))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            core.setOutput("release_id", String(release.data.id));
            core.setOutput("latest_asset_id", assets[0] ? String(assets[0].id) : "");
            core.setOutput("latest_asset_name", assets[0] ? assets[0].name : "");

      - name: Restore Latest Snapshot
        if: steps.release.outputs.latest_asset_id != ''
        run: |
          mkdir -p data public/db
          curl -L \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/${{ steps.release.outputs.latest_asset_id }}" \
            -o /tmp/latest-snapshot.tar.gz
          tar -xzf /tmp/latest-snapshot.tar.gz -C .
          if [ ! -f data/source.sqlite ] && [ -f public/db/source_com_repositorios.sqlite.gz ]; then
            gunzip -c public/db/source_com_repositorios.sqlite.gz > data/source.sqlite
          fi
          echo "Restored snapshot: ${{ steps.release.outputs.latest_asset_name }}"

      - name: Prepare Directories
        run: |
          mkdir -p data public/db

      - name: Incremental CVE Update
        run: |
          python scripts/create-manifest.py cves --year-auto

      - name: Incremental Repository Verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/create-manifest.py repos --batch-size "${REPO_BATCH_SIZE}"

      - name: Build DB Artifacts
        run: |
          bash scripts/build-db-artifacts.sh

      - name: Validate Snapshot DB Size
        env:
          MIN_CVE_COUNT: "1000"
        run: |
          total=$(sqlite3 data/source.sqlite "SELECT COUNT(*) FROM cves;")
          echo "[INFO] Total CVEs in snapshot candidate: ${total}"
          if [ "${total}" -lt "${MIN_CVE_COUNT}" ]; then
            echo "[ERROR] Snapshot aborted: only ${total} CVEs (< ${MIN_CVE_COUNT}). Likely stale/incomplete DB state."
            exit 1
          fi

      - name: Read Manifest Range
        id: manifest_range
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let data = {};
            if (fs.existsSync('public/db/manifest.json')) {
              data = JSON.parse(fs.readFileSync('public/db/manifest.json', 'utf8'));
            }
            const cveRange = ((data.scan_metadata || {}).cve_range || {});
            const tokenize = s => (s || 'unknown').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'unknown';
            core.setOutput('from_token', tokenize(cveRange.from));
            core.setOutput('to_token', tokenize(cveRange.to));

      - name: Pack Snapshot
        id: pack
        run: |
          SNAPSHOT_NAME="snapshot-${{ steps.manifest_range.outputs.from_token }}-to-${{ steps.manifest_range.outputs.to_token }}-$(date -u +%Y%m%dT%H%M%SZ).tar.gz"
          tar -czf "${SNAPSHOT_NAME}" \
            public/db/manifest.json \
            public/db/source_com_repositorios.sqlite.gz
          echo "snapshot_name=${SNAPSHOT_NAME}" >> "$GITHUB_OUTPUT"
          ls -lh "${SNAPSHOT_NAME}"

      - name: Upload Snapshot Asset
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const releaseId = parseInt('${{ steps.release.outputs.release_id }}', 10);
            const filePath = '${{ steps.pack.outputs.snapshot_name }}';
            const fileName = path.basename(filePath);
            const data = fs.readFileSync(filePath);

            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: releaseId,
              name: fileName,
              data,
              headers: {
                'content-type': 'application/gzip',
                'content-length': data.length
              }
            });

            core.info(`Uploaded ${fileName} to release (ID: ${releaseId})`);

      - name: Prune Old Snapshots (Keep 3)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = process.env.SNAPSHOT_TAG;
            const keep = 3;

            const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            const snapshots = (release.data.assets || [])
              .filter(a => /^snapshot-.*\.tar\.gz$/.test(a.name))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = snapshots.slice(keep);
            for (const asset of toDelete) {
              core.info(`Deleting old snapshot: ${asset.name} (${asset.id})`);
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: asset.id
              });
            }

      - name: Trigger Deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });
